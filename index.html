<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>NYC Building GHG AR Demo</title>

  <!-- A-Frame + AR.js -->
  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/AR-js-org/AR.js@3.4.7/aframe/build/aframe-ar.js"></script>

  <style>
    body {
      margin: 0;
      overflow: hidden;
      font-family: Arial, sans-serif;
    }

  </style>
</head>

<body>
  <a-scene
    embedded
    arjs="sourceType: webcam; debugUIEnabled: false;"
    renderer="logarithmicDepthBuffer: true;"
  >
    <!-- Use the default Hiro marker -->
    <a-marker id="hiro-marker" preset="hiro" emitevents="true">

      <!-- Ground base -->
      <a-box
        position="0 0.03 0"
        scale="3.8 0.06 2.6"
        color="#e6f2ff"
        opacity="0.85">
      </a-box>

      <a-entity position="0 0 0.12" rotation="-14 0 0">
        <!-- Central NYC building, tilted slightly toward the camera -->
        <a-box
          position="0 0.75 0"
          scale="0.78 1.5 0.72"
          color="#4f83cc">
        </a-box>

        <!-- Side buildings for a clearer skyline silhouette -->
        <a-box
          position="-0.82 0.48 0.1"
          scale="0.42 0.95 0.48"
          color="#6aa8dc">
        </a-box>

        <a-box
          position="0.78 0.56 0.08"
          scale="0.48 1.1 0.5"
          color="#3f6fa8">
        </a-box>

        <!-- Roof -->
        <a-cone
          position="0 1.62 0"
          radius-bottom="0.55"
          radius-top="0.15"
          height="0.35"
          color="#2f4f7f">
        </a-cone>

        <!-- Front windows -->
        <a-box position="-0.22 0.55 -0.37" scale="0.12 0.12 0.02" color="#ffffff"></a-box>
        <a-box position="0.00 0.55 -0.37" scale="0.12 0.12 0.02" color="#ffffff"></a-box>
        <a-box position="0.22 0.55 -0.37" scale="0.12 0.12 0.02" color="#ffffff"></a-box>

        <a-box position="-0.22 0.85 -0.37" scale="0.12 0.12 0.02" color="#ffffff"></a-box>
        <a-box position="0.00 0.85 -0.37" scale="0.12 0.12 0.02" color="#ffffff"></a-box>
        <a-box position="0.22 0.85 -0.37" scale="0.12 0.12 0.02" color="#ffffff"></a-box>

        <a-box position="-0.22 1.15 -0.37" scale="0.12 0.12 0.02" color="#ffffff"></a-box>
        <a-box position="0.00 1.15 -0.37" scale="0.12 0.12 0.02" color="#ffffff"></a-box>
        <a-box position="0.22 1.15 -0.37" scale="0.12 0.12 0.02" color="#ffffff"></a-box>

        <!-- Side building windows -->
        <a-box position="-0.92 0.35 -0.15" scale="0.08 0.09 0.02" color="#ffffff"></a-box>
        <a-box position="-0.74 0.35 -0.15" scale="0.08 0.09 0.02" color="#ffffff"></a-box>
        <a-box position="-0.92 0.58 -0.15" scale="0.08 0.09 0.02" color="#ffffff"></a-box>
        <a-box position="-0.74 0.58 -0.15" scale="0.08 0.09 0.02" color="#ffffff"></a-box>

        <a-box position="0.68 0.42 -0.18" scale="0.08 0.09 0.02" color="#ffffff"></a-box>
        <a-box position="0.88 0.42 -0.18" scale="0.08 0.09 0.02" color="#ffffff"></a-box>
        <a-box position="0.68 0.68 -0.18" scale="0.08 0.09 0.02" color="#ffffff"></a-box>
        <a-box position="0.88 0.68 -0.18" scale="0.08 0.09 0.02" color="#ffffff"></a-box>

        <!-- Small animated emissions cloud -->
        <a-sphere
          position="0.45 1.75 0"
          radius="0.16"
          color="#9e9e9e"
          opacity="0.65"
          animation="property: position; to: 0.45 2.05 0; dir: alternate; dur: 1200; loop: true">
        </a-sphere>

        <a-sphere
          position="0.65 1.95 0.05"
          radius="0.11"
          color="#bdbdbd"
          opacity="0.55"
          animation="property: position; to: 0.65 2.2 0.05; dir: alternate; dur: 1400; loop: true">
        </a-sphere>
      </a-entity>

    </a-marker>

    <a-entity camera></a-entity>
  </a-scene>
</body>
</html>
