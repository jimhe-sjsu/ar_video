<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>NYC Building GHG AR Demo</title>

  <!-- A-Frame + AR.js -->
  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/AR-js-org/AR.js@3.4.7/aframe/build/aframe-ar.js"></script>

  <style>
    body {
      margin: 0;
      overflow: hidden;
      font-family: Arial, sans-serif;
    }

  </style>
</head>

<body>
  <a-scene
    embedded
    arjs="sourceType: webcam; debugUIEnabled: false;"
    renderer="logarithmicDepthBuffer: true;"
  >
    <!-- Use the default Hiro marker -->
    <a-marker id="hiro-marker" preset="hiro" emitevents="true">

      <a-entity position="0 0 0.05" rotation="-14 0 0">
        <!-- Road on the opposite side, closer to the buildings -->
        <a-box
          position="0 0.015 0.46"
          scale="2.2 0.03 0.34"
          color="#2b2f36">
        </a-box>

        <a-box
          position="-0.42 0.04 0.46"
          scale="0.36 0.012 0.035"
          color="#f5d76e">
        </a-box>

        <a-box
          position="0.42 0.04 0.46"
          scale="0.36 0.012 0.035"
          color="#f5d76e">
        </a-box>

        <!-- Left building -->
        <a-box
          position="-0.38 0.55 0.08"
          scale="0.52 1.1 0.48"
          color="#4b78b8">
        </a-box>

        <!-- Right building -->
        <a-box
          position="0.38 0.65 0.08"
          scale="0.52 1.3 0.48"
          color="#5d8fca">
        </a-box>

        <!-- Windows moved to the opposite side of the buildings -->
        <a-box position="-0.48 0.42 0.33" scale="0.08 0.09 0.02" color="#ffffff"></a-box>
        <a-box position="-0.28 0.42 0.33" scale="0.08 0.09 0.02" color="#ffffff"></a-box>
        <a-box position="-0.48 0.65 0.33" scale="0.08 0.09 0.02" color="#ffffff"></a-box>
        <a-box position="-0.28 0.65 0.33" scale="0.08 0.09 0.02" color="#ffffff"></a-box>
        <a-box position="-0.48 0.88 0.33" scale="0.08 0.09 0.02" color="#ffffff"></a-box>
        <a-box position="-0.28 0.88 0.33" scale="0.08 0.09 0.02" color="#ffffff"></a-box>

        <a-box position="0.28 0.42 0.33" scale="0.08 0.09 0.02" color="#ffffff"></a-box>
        <a-box position="0.48 0.42 0.33" scale="0.08 0.09 0.02" color="#ffffff"></a-box>
        <a-box position="0.28 0.68 0.33" scale="0.08 0.09 0.02" color="#ffffff"></a-box>
        <a-box position="0.48 0.68 0.33" scale="0.08 0.09 0.02" color="#ffffff"></a-box>
        <a-box position="0.28 0.94 0.33" scale="0.08 0.09 0.02" color="#ffffff"></a-box>
        <a-box position="0.48 0.94 0.33" scale="0.08 0.09 0.02" color="#ffffff"></a-box>

        <!-- Pollution cloud around the right building -->
        <a-sphere
          position="0.68 0.92 0.12"
          radius="0.16"
          color="#8d8d8d"
          opacity="0.55">
        </a-sphere>

        <a-sphere
          position="0.78 1.12 0.16"
          radius="0.12"
          color="#a6a6a6"
          opacity="0.5">
        </a-sphere>

        <a-sphere
          position="0.58 1.25 0.08"
          radius="0.14"
          color="#7a7a7a"
          opacity="0.45">
        </a-sphere>

        <a-sphere
          position="0.2 1.06 0.12"
          radius="0.11"
          color="#9a9a9a"
          opacity="0.45">
        </a-sphere>
      </a-entity>

    </a-marker>

    <a-entity camera></a-entity>
  </a-scene>
</body>
</html>
