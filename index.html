<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>NYC Building GHG AR Demo</title>

  <!-- A-Frame + AR.js -->
  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/AR-js-org/AR.js@3.4.7/aframe/build/aframe-ar.js"></script>

  <style>
    body {
      margin: 0;
      overflow: hidden;
      font-family: Arial, sans-serif;
    }

  </style>
</head>

<body>
  <a-scene
    embedded
    arjs="sourceType: webcam; debugUIEnabled: false;"
    renderer="logarithmicDepthBuffer: true;"
  >
    <!-- Use the default Hiro marker -->
    <a-marker id="hiro-marker" preset="hiro" emitevents="true">

      <a-entity position="0 0 0.08" rotation="-16 0 0">
        <!-- Single building body, tilted slightly toward the camera -->
        <a-box
          position="0 0.8 0"
          scale="0.9 1.6 0.7"
          color="#4b78b8">
        </a-box>

        <!-- Darker side face for depth -->
        <a-box
          position="0.47 0.8 0.04"
          scale="0.04 1.6 0.62"
          color="#345d95">
        </a-box>

        <!-- Roof cap -->
        <a-box
          position="0 1.64 0"
          scale="1.0 0.12 0.78"
          color="#263f66">
        </a-box>

        <!-- Small rooftop structure -->
        <a-box
          position="0 1.78 0"
          scale="0.36 0.22 0.36"
          color="#2f4f7f">
        </a-box>

        <a-cylinder
          position="0 1.96 0"
          radius="0.025"
          height="0.28"
          color="#263f66">
        </a-cylinder>

        <!-- Windows -->
        <a-box position="-0.22 0.55 -0.37" scale="0.12 0.12 0.02" color="#ffffff"></a-box>
        <a-box position="0.00 0.55 -0.37" scale="0.12 0.12 0.02" color="#ffffff"></a-box>
        <a-box position="0.22 0.55 -0.37" scale="0.12 0.12 0.02" color="#ffffff"></a-box>

        <a-box position="-0.22 0.85 -0.37" scale="0.12 0.12 0.02" color="#ffffff"></a-box>
        <a-box position="0.00 0.85 -0.37" scale="0.12 0.12 0.02" color="#ffffff"></a-box>
        <a-box position="0.22 0.85 -0.37" scale="0.12 0.12 0.02" color="#ffffff"></a-box>

        <a-box position="-0.22 1.15 -0.37" scale="0.12 0.12 0.02" color="#ffffff"></a-box>
        <a-box position="0.00 1.15 -0.37" scale="0.12 0.12 0.02" color="#ffffff"></a-box>
        <a-box position="0.22 1.15 -0.37" scale="0.12 0.12 0.02" color="#ffffff"></a-box>

        <!-- Door -->
        <a-box position="0 0.12 -0.37" scale="0.22 0.24 0.025" color="#1f2d3d"></a-box>
      </a-entity>

    </a-marker>

    <a-entity camera></a-entity>
  </a-scene>
</body>
</html>
