<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>NYC Building GHG AR Demo</title>

  <!-- A-Frame + AR.js -->
  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/AR-js-org/AR.js@3.4.7/aframe/build/aframe-ar.js"></script>

  <style>
    body {
      margin: 0;
      overflow: hidden;
      font-family: Arial, sans-serif;
    }

    #status {
      position: fixed;
      top: 12px;
      left: 12px;
      z-index: 10;
      max-width: min(360px, calc(100vw - 24px));
      padding: 10px 12px;
      color: #ffffff;
      background: rgba(0, 0, 0, 0.72);
      border: 1px solid rgba(255, 255, 255, 0.45);
      border-radius: 6px;
      font-size: 14px;
      line-height: 1.35;
    }
  </style>
</head>

<body>
  <div id="status">Starting camera...</div>

  <a-scene
    embedded
    arjs="sourceType: webcam; debugUIEnabled: false;"
    renderer="logarithmicDepthBuffer: true;"
  >
    <!-- Use the default Hiro marker -->
    <a-marker id="hiro-marker" preset="hiro" emitevents="true">

      <!-- Ground base -->
      <a-box
        position="0 0.03 0"
        scale="3.8 0.06 2.6"
        color="#e6f2ff"
        opacity="0.85">
      </a-box>

      <!-- Bright detection block, useful while testing marker recognition -->
      <a-box
        position="0 0.22 0"
        scale="0.55 0.35 0.55"
        color="#00ff66"
        animation="property: rotation; to: 0 360 0; dur: 2500; loop: true">
      </a-box>

      <!-- Central NYC building -->
      <a-box
        position="0 0.75 0"
        scale="0.75 1.5 0.75"
        color="#4f83cc">
      </a-box>

      <!-- Roof -->
      <a-cone
        position="0 1.62 0"
        radius-bottom="0.55"
        radius-top="0.15"
        height="0.35"
        color="#2f4f7f">
      </a-cone>

      <!-- Windows -->
      <a-box position="-0.22 0.55 -0.39" scale="0.12 0.12 0.02" color="#ffffff"></a-box>
      <a-box position="0.00 0.55 -0.39" scale="0.12 0.12 0.02" color="#ffffff"></a-box>
      <a-box position="0.22 0.55 -0.39" scale="0.12 0.12 0.02" color="#ffffff"></a-box>

      <a-box position="-0.22 0.85 -0.39" scale="0.12 0.12 0.02" color="#ffffff"></a-box>
      <a-box position="0.00 0.85 -0.39" scale="0.12 0.12 0.02" color="#ffffff"></a-box>
      <a-box position="0.22 0.85 -0.39" scale="0.12 0.12 0.02" color="#ffffff"></a-box>

      <a-box position="-0.22 1.15 -0.39" scale="0.12 0.12 0.02" color="#ffffff"></a-box>
      <a-box position="0.00 1.15 -0.39" scale="0.12 0.12 0.02" color="#ffffff"></a-box>
      <a-box position="0.22 1.15 -0.39" scale="0.12 0.12 0.02" color="#ffffff"></a-box>

      <!-- Title panel -->
      <a-plane
        position="0 2.25 -0.05"
        rotation="-65 0 0"
        width="3.3"
        height="0.45"
        color="#0b2545"
        opacity="0.95">
      </a-plane>

      <a-text
        value="NYC Building GHG Intensity Prediction"
        position="-1.45 2.27 -0.13"
        rotation="-65 0 0"
        color="#ffffff"
        width="3.2"
        align="center">
      </a-text>

      <!-- Left metadata forecasting panel -->
      <a-plane
        position="-1.75 1.1 0"
        rotation="-65 0 0"
        width="1.7"
        height="1.0"
        color="#d9f2e6"
        opacity="0.95">
      </a-plane>

      <a-text
        value="Metadata Forecasting&#10;Inputs: property type, floor area, year built, occupancy&#10;Random Forest R2 = 0.472&#10;Clean pre-disclosure prediction"
        position="-2.48 1.28 -0.18"
        rotation="-65 0 0"
        color="#003d2b"
        width="1.55"
        align="left">
      </a-text>

      <!-- Right fuel-aware estimation panel -->
      <a-plane
        position="1.75 1.1 0"
        rotation="-65 0 0"
        width="1.7"
        height="1.0"
        color="#fff1cc"
        opacity="0.95">
      </a-plane>

      <a-text
        value="Fuel-Aware Estimation&#10;Inputs: electricity, gas, steam, oil intensity&#10;Random Forest R2 = 0.980&#10;Strong, but target-adjacent"
        position="1.02 1.28 -0.18"
        rotation="-65 0 0"
        color="#5c3b00"
        width="1.55"
        align="left">
      </a-text>

      <!-- Bottom warning panel -->
      <a-plane
        position="0 0.35 1.1"
        rotation="-75 0 0"
        width="3.4"
        height="0.55"
        color="#ffcccc"
        opacity="0.95">
      </a-plane>

      <a-text
        value="Data Leakage Warning: Fuel intensity is directly related to the target"
        position="-1.55 0.43 0.91"
        rotation="-75 0 0"
        color="#8b0000"
        width="3.1"
        align="center">
      </a-text>

      <!-- Arrows / connector lines -->
      <a-cylinder
        position="-0.85 0.8 0"
        rotation="0 0 60"
        radius="0.025"
        height="1.2"
        color="#00a676">
      </a-cylinder>

      <a-cylinder
        position="0.85 0.8 0"
        rotation="0 0 -60"
        radius="0.025"
        height="1.2"
        color="#e69500">
      </a-cylinder>

      <!-- Small animated emissions cloud -->
      <a-sphere
        position="0.45 1.75 0"
        radius="0.16"
        color="#9e9e9e"
        opacity="0.65"
        animation="property: position; to: 0.45 2.05 0; dir: alternate; dur: 1200; loop: true">
      </a-sphere>

      <a-sphere
        position="0.65 1.95 0.05"
        radius="0.11"
        color="#bdbdbd"
        opacity="0.55"
        animation="property: position; to: 0.65 2.2 0.05; dir: alternate; dur: 1400; loop: true">
      </a-sphere>

    </a-marker>

    <a-entity camera></a-entity>
  </a-scene>

  <script>
    window.addEventListener('DOMContentLoaded', function () {
      var status = document.getElementById('status');
      var marker = document.getElementById('hiro-marker');

      function setStatus(message) {
        status.textContent = message;
      }

      window.addEventListener('camera-init', function () {
        setStatus('Camera ready. Looking for the Hiro marker...');
      });

      window.addEventListener('camera-error', function (event) {
        var name = event.detail && event.detail.name ? event.detail.name : 'unknown';
        setStatus('Camera error: ' + name);
      });

      marker.addEventListener('markerFound', function () {
        setStatus('Hiro marker detected. Hold steady.');
      });

      marker.addEventListener('markerLost', function () {
        setStatus('Marker lost. Show the full black border and avoid glare.');
      });
    });
  </script>
</body>
</html>
