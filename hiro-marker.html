<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hiro Marker</title>
  <style>
    body {
      min-height: 100vh;
      margin: 0;
      display: grid;
      place-items: center;
      background: #f5f5f5;
      font-family: Arial, sans-serif;
    }

    main {
      display: grid;
      gap: 16px;
      justify-items: center;
      padding: 24px;
    }

    img {
      width: min(78vmin, 720px);
      height: auto;
      background: #ffffff;
      border: 1px solid #cccccc;
    }

    p {
      max-width: 620px;
      margin: 0;
      color: #222222;
      font-size: 16px;
      line-height: 1.45;
      text-align: center;
    }
  </style>
</head>
<body>
  <main>
    <img src="assets/hiro.png" alt="AR.js Hiro marker" />
    <p>Display this marker on a second screen or print it. Keep the full black border visible in the camera.</p>
  </main>
</body>
</html>
